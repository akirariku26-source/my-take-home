services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  tts-inference:
    build:
      context: .
      dockerfile: Dockerfile.inference
    ports:
      - "50051:50051"
    volumes:
      # Persist HuggingFace model weights across restarts (~200 MB first download)
      - hf-cache:/app/.hf_cache
    environment:
      TTS_INFERENCE_PORT: "50051"
      TTS_MAX_WORKERS: "2"
      HF_HOME: /app/.hf_cache
    healthcheck:
      test: ["CMD", "python", "-m", "tts_api.inference.healthcheck"]
      interval: 15s
      timeout: 10s
      start_period: 120s   # allow time for model download on first boot
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G        # Kokoro model + torch runtime
        reservations:
          memory: 1G

  tts-api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - hf-cache:/app/.hf_cache
    env_file: .env
    environment:
      # Docker-internal service discovery overrides (use service name, not localhost)
      TTS_QUEUE_ENABLED: "true"
      TTS_CELERY_BROKER_URL: "redis://redis:6379/0"
      TTS_CELERY_RESULT_BACKEND_URL: "redis://redis:6379/0"
      TTS_INFERENCE_HOST: "tts-inference"
      TTS_INFERENCE_PORT: "50051"
      HF_HOME: /app/.hf_cache
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M      # API server only — no model weights loaded
        reservations:
          memory: 128M

  celery-worker:
    build: .
    command: >
      /app/.venv/bin/celery -A tts_api.workers.celery_app:celery_app worker
      --loglevel=info --concurrency=2 --pool=solo
    env_file: .env
    environment:
      # Docker-internal service discovery overrides (use service name, not localhost)
      TTS_CELERY_BROKER_URL: "redis://redis:6379/0"
      TTS_CELERY_RESULT_BACKEND_URL: "redis://redis:6379/0"
      TTS_INFERENCE_HOST: "tts-inference"
      TTS_INFERENCE_PORT: "50051"
    depends_on:
      redis:
        condition: service_healthy
      tts-inference:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M      # thin worker — no model weights, gRPC client only
        reservations:
          memory: 64M

volumes:
  hf-cache:
    driver: local
  redis-data:
    driver: local
